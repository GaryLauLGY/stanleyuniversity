    :root {
      --ink: #1f2933;

      --line: #ded8cd;
      --panel: #ffffff;
      --navy: #102a43;
      --green: #2f6b5f;
      --gold: #b8872c;
      --rose: #ad4f5f;
      --blue: #2f5f9f;
      --soft-green: #e8f1ee;
      --soft-gold: #f7ecd4;
      --soft-rose: #f5e5e8;
      --soft-blue: #e8eef8;
      --shadow: 0 18px 45px rgba(16, 42, 67, .08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(16,42,67,.045) 1px, transparent 1px),
        linear-gradient(180deg, rgba(16,42,67,.035) 1px, transparent 1px),
        var(--paper);
      background-size: 36px 36px;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
      line-height: 1.78;
    }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 40px 24px 64px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 720;
    }

    .topbar a {
      color: inherit;
      text-decoration: none;
    }

    .topbar a:hover {
      color: var(--green);
    }

    .topbar-links {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: flex-end;
    }

    header {
      display: grid;
      grid-template-columns: 1.4fr .9fr;
      gap: 28px;
      align-items: stretch;
      min-height: 520px;
      margin-bottom: 28px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 44px;
      border: 1px solid var(--line);
      background: var(--navy);
      color: #fff;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(255,255,255,.18);
      pointer-events: none;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -120px;
      bottom: -120px;
      width: 320px;
      height: 320px;
      background:
        linear-gradient(135deg, rgba(184,135,44,.9), rgba(173,79,95,.65));
      transform: rotate(18deg);
      opacity: .72;
    }

    .eyebrow {
      position: relative;
      z-index: 1;
      font-size: 13px;
      letter-spacing: 0;
      color: rgba(255,255,255,.74);
      text-transform: uppercase;
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 76px 0 18px;
      max-width: 760px;
      font-size: clamp(42px, 7vw, 86px);
      line-height: .98;
      font-weight: 850;
      letter-spacing: 0;
    }

    .subtitle {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0;
      font-size: 22px;
      color: rgba(255,255,255,.84);
    }

    .hero-footer {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 44px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 5px 12px;
      border: 1px solid rgba(255,255,255,.28);
      color: rgba(255,255,255,.88);
      background: rgba(255,255,255,.08);
      font-size: 14px;
    }

    .meta-panel {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.86);
      box-shadow: var(--shadow);
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .meta-title {
      margin: 0 0 16px;
      font-size: 18px;
      color: var(--muted);
      font-weight: 700;
    }

    .meta-list {
      display: grid;
      gap: 12px;
      margin: 0;
    }

    .meta-row {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }

    .meta-row span:first-child {
      color: var(--muted);
      font-size: 14px;
    }

    .meta-row span:last-child {
      font-weight: 720;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin: 28px 0 34px;
    }

    .metric {
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 20px;
      min-height: 126px;
      box-shadow: 0 12px 30px rgba(31,41,51,.05);
    }

    .metric strong {
      display: block;
      margin-bottom: 5px;
      color: var(--navy);
      font-size: 34px;
      line-height: 1;
    }

    .metric span {
      color: var(--muted);
      font-size: 14px;
    }

    section {
      margin-top: 34px;
      padding: 34px 0;
      border-top: 2px solid var(--ink);
    }

    .section-head {
      display: grid;
      grid-template-columns: 180px 1fr 180px;
      gap: 24px;
      align-items: start;
      margin-bottom: 22px;
    }

    .section-kicker {
      color: var(--green);
      font-weight: 850;
      font-size: 14px;
      text-align: left;
      grid-column: 1;
      grid-row: 1;
    }

    .section-head h2 {
      grid-column: 1 / -1;
      grid-row: 1;
      text-align: center;
    }

    .section-head.stacked {
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .section-head.stacked .section-kicker {
      grid-column: 1;
      grid-row: 1;
    }

    .section-head.stacked h2 {
      grid-column: 1;
      grid-row: 2;
      text-align: center;
    }

    h2 {
      margin: 0;
      font-size: 34px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .lead {
      margin: 0;
      font-size: 19px;
      color: #2d3748;
    }

    .summary {
      columns: 2 360px;
      column-gap: 34px;
      font-size: 17px;
    }

    .summary p {
      break-inside: avoid;
      margin: 0 0 18px;
    }

    .events {
      display: grid;
      gap: 14px;
    }

    .event {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 18px;
      padding: 22px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 10px 26px rgba(31,41,51,.04);
    }

    .event-no {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--green);
      font-size: 22px;
      font-weight: 850;
    }

    .event:nth-child(3n+2) .event-no {
      background: var(--blue);
    }

    .event:nth-child(3n) .event-no {
      background: var(--gold);
    }

    .event h3 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.35;
    }

    .event p {
      margin: 0;
      color: #344054;
    }

    .grid-two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .info-block {
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 24px;
    }

    .info-block h3 {
      margin: 0 0 12px;
      font-size: 22px;
    }

    .info-block ul,
    .info-block ol {
      margin: 0;
      padding-left: 21px;
    }

    .info-block li {
      margin: 7px 0;
    }

    .highlight {
      background: var(--soft-gold);
      border-color: #e2c77c;
    }

    .blue {
      background: var(--soft-blue);
      border-color: #b8c9e6;
    }

    .green {
      background: var(--soft-green);
      border-color: #abc9c0;
    }

    .rose {
      background: var(--soft-rose);
      border-color: #d7acb5;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      text-align: left;
    }

    th {
      background: var(--navy);
      color: #fff;
      font-size: 14px;
      font-weight: 760;
    }

    td {
      font-size: 15px;
    }

    .topics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .topic {
      padding: 24px;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    .topic h3 {
      margin: 0 0 12px;
      color: var(--navy);
      font-size: 22px;
    }

    .topic p {
      margin: 0;
      color: #344054;
    }

    .actions {
      counter-reset: action;
      display: grid;
      gap: 12px;
    }

    .action {
      counter-increment: action;
      position: relative;
      padding: 18px 20px 18px 62px;
      background: var(--panel);
      border: 1px solid var(--line);
    }

    .action::before {
      content: counter(action);
      position: absolute;
      left: 18px;
      top: 18px;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--rose);
      font-weight: 850;
      font-size: 14px;
    }

    footer {
      margin-top: 46px;
      padding: 22px 0 0;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 860px) {
      .page {
        padding: 22px 14px 42px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .topbar-links {
        justify-content: flex-start;
      }

      header,
      .section-head,
      .grid-two,
      .topics,
      .metrics {
        grid-template-columns: 1fr;
      }

      header {
        min-height: auto;
      }

      .hero {
        min-height: 460px;
        padding: 30px;
      }

      h1 {
        margin-top: 62px;
      }

      .event {
        grid-template-columns: 1fr;
      }

      .event-no {
        width: 44px;
        height: 44px;
      }

      .section-head h2 {
        grid-column: auto;
        text-align: left;
      }

      .section-kicker {
        grid-column: auto;
        text-align: left;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .page {
        max-width: none;
        padding: 0;
      }

      .hero,
      .meta-panel,
      .metric,
      .event,
      .info-block,
      .topic,
      .action {
        box-shadow: none;
      }

      section {
